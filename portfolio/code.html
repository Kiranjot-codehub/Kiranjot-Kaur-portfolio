<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:linear-gradient(135deg, #9ea8d9 0%, #b8a6c9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background:white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color:#333;
            margin-bottom: 30px;
            font-size: 2.2em;
            font-weight: 700;
        }
        

        .input-group {
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .qr-container {
            margin: 30px 0;
            padding: 30px;
            background:#f8f9fa;
            border-radius: 16px;
            border: 3px dashed #dee2e6;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #qrcode {
            width: 256px;
            height: 256px;
            
        }

        .no-qr {
            color: #6c757d;
            font-size: 18px;
            font-style: italic;
        }

        .download-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            display: none;
        }

        .download-btn:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        .error {
            color: #dc3545;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            #qrcode {
                width: 220px;
                height: 220px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 QR Code Generator</h1>
        
        <div class="input-group">
            <input type="text" id="textInput" placeholder="Enter text, URL, or any data..." value="https://example.com">
            <div class="error" id="errorMsg">Please enter some text to generate a QR code!</div>
        </div>
        
        <button class="btn-generate" onclick="generateQR()">Generate QR Code</button>
        
        <div class="qr-container">
            <div id="qrcode" class="no-qr">QR Code will appear here...</div>
        </div>
        
        <button class="download-btn" id="downloadBtn" onclick="downloadQR()">📥 Download QR Code</button>
    </div>

    <script>
        let qrCodeInstance = null;

        function generateQR() {
            const text = document.getElementById('textInput').value.trim();
            const qrContainer = document.getElementById('qrcode');
            const errorMsg = document.getElementById('errorMsg');
            const downloadBtn = document.getElementById('downloadBtn');

            // Clear previous QR
            if (qrCodeInstance) {
                qrCodeInstance.clear();
            }
            qrContainer.innerHTML = '';
            errorMsg.style.display = 'none';
            downloadBtn.style.display = 'none';

            if (!text) {
                errorMsg.style.display = 'block';
                qrContainer.innerHTML = '<div class="no-qr">Please enter some text first!</div>';
                return;
            }

            // Create new QR code
            qrCodeInstance = new QRCode(qrContainer, {
                text: text,
                width: 256,
                height: 256,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // Show download button after QR is generated
            setTimeout(() => {
                downloadBtn.style.display = 'inline-block';
            }, 100);
        }

        function downloadQR() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            if (qrCanvas) {
                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = qrCanvas.toDataURL();
                link.click();
            }
        }

        // Generate QR on Enter key press
        document.getElementById('textInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateQR();
            }
        });

        // Auto-generate QR on page load
        window.addEventListener('load', function() {
            setTimeout(() => {
                generateQR();
            }, 500);
        });
    </script>
</body>
</html>
